<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <h1>Todos</h1>
      <form id="todo-form" class="todo-form">
        <label for="todo-input" class="sr-only">Add a todo</label>
        <input id="todo-input" name="todo" type="text" placeholder="Add a task..." autocomplete="off" required />
        <button type="submit">Add</button>
      </form>
      <p id="empty-state" class="empty-state">No todos yet. Add one above.</p>
      <ul id="todo-list" class="todo-list" aria-live="polite"></ul>
    </main>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
