<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Web App</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="todo-panel" aria-labelledby="todo-title">
        <header class="panel-header">
          <p class="eyebrow">Daily planning</p>
          <h1 id="todo-title">Todo List</h1>
        </header>

        <form id="todo-form" class="todo-form" autocomplete="off">
          <label for="todo-input" class="sr-only">Todo title</label>
          <input
            id="todo-input"
            name="todo"
            type="text"
            placeholder="What needs to be done?"
            maxlength="120"
            required
          />
          <button id="add-todo-button" type="submit">Add</button>
        </form>

        <ul id="todo-list" class="todo-list" aria-live="polite"></ul>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
